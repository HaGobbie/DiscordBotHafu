name: Automation Matrix Sync

on:
  schedule:
    - cron: '0 2 * * *' # Executes completely automated every day at 2:00 AM
  workflow_dispatch: # Gives you a manual button to push updates whenever you want

# Explicitly grant the runner permission to write changes back to the repo
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears the Node.js deprecation warning

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    - name: Access Repository Source Tree
      uses: actions/checkout@v4

    - name: Initialize Environment Modules
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Scraping Dependencies
      run: |
        pip install -r requirements.txt
        pip install deep-translator

    - name: Run Extraction Data Matrix Build
      run: python compile_database.py

    - name: Verify and Commit Changes to Main Tree
      run: |
        git config --global user.name "Hafu Datastream Core"
        git config --global user.email "actions@github.com"
        
        # 1. Cleanly delete and untrack the old master text asset if it exists
        git rm -f knowledge_database.txt || true
        
        # 2. Stage the entire new ultra-granular database folder structure
        git add knowledge_base/
        
        # Evaluates modification differentials across deletions and additions
        if git diff-index --quiet HEAD --; then
          echo "No new data changes detected. Skipping tree commit."
        else
          git commit -m "🤖 Synchronized granular live text asset matrix - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push origin HEAD:${{ github.ref }}
        fi
